<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medium Level</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.card{border-radius:20px;}
.word{font-size:50px;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card p-4 text-center shadow-lg">
<h2 class="mb-3">Medium Level</h2>

<div id="word" class="word mb-3"></div>
<input type="text" id="input" class="form-control form-control-lg text-center mb-3" disabled>

<div class="progress mb-3" style="height:25px;">
<div id="bar" class="progress-bar bg-info" style="width:100%">10</div>
</div>

<div class="d-flex justify-content-between mb-3">
<div id="timer">Time: 10</div>
<div id="score">Score: 0</div>
</div>

<button onclick="startGame()" class="btn btn-info btn-lg w-100">Start</button>
</div>
</div>
</div>
</div>

<script>
var words=["variable","function","console","object","array","return","boolean"];
var time=10;
var max=10;
var score=0;
var current="";
var interval;
var active=false;

function pick(){
clearInterval(interval);
current=words[Math.floor(Math.random()*words.length)];
document.getElementById("word").textContent=current;
time=max;
update();
interval=setInterval(run,1000);
}

function run(){
time--;
update();
if(time<=0)end();
}

function update(){
document.getElementById("timer").textContent="Time: "+time;
document.getElementById("bar").style.width=(time/max*100)+"%";
document.getElementById("bar").textContent=time;
}

function startGame(){
score=0;
active=true;
document.getElementById("score").textContent="Score: 0";
document.getElementById("input").disabled=false;
document.getElementById("input").value="";
document.getElementById("input").focus();
pick();
}

function end(){
clearInterval(interval);
active=false;
alert("Game Over! Score: "+score);
score=0;
document.getElementById("score").textContent="Score: 0";
document.getElementById("input").disabled=true;
document.getElementById("input").value="";
document.getElementById("word").textContent="";
time=max;
update();
}

document.getElementById("input").addEventListener("input",function(e){
if(!active)return;
if(e.target.value.toLowerCase()===current.toLowerCase()){
e.target.value="";
score++;
document.getElementById("score").textContent="Score: "+score;
pick();
}
});
</script>

</body>
</html>
